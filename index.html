<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aga Mohammad Fawaz | Portfolio</title>
    <style>
        :root { --bg: #000; --accent: #00ff41; /* Changed to tech-green */ --text: #fff; --card-bg: #111; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        
        /* Card Style */
        .card { background: var(--card-bg); border: 1px solid #333; border-radius: 15px; padding: 20px; margin: 20px 0; transition: 0.3s; }
        .card:hover { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); }
        
        /* Progress Bar */
        .skill-container { margin: 15px 0; text-align: left; }
        .bar { height: 8px; background: #222; border-radius: 4px; overflow: hidden; }
        .fill { height: 100%; background: var(--accent); width: 0; transition: 2s; }

        h2 { color: var(--accent); border-bottom: 2px solid var(--accent); display: inline-block; padding-bottom: 5px; }
        .btn { display: block; background: var(--accent); color: #000; padding: 15px; border-radius: 10px; font-weight: bold; text-decoration: none; margin: 10px 0; }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 3rem; color: var(--accent);">آغا محمد فواد</div>
        <h1>Aga Mohammad Fawaz</h1>
        <a href="#" class="btn">Contact Me</a>
    </header>

    <section class="card">
        <h2>About Me</h2>
        <p>CSE Diploma Student at KGP. Passionate about IoT, C Programming, and Existential Literature.</p>
    </section>

    <section class="card">
        <h2>Skills</h2>
        <div class="skill-container">
            <span>C Programming</span>
            <div class="bar"><div class="fill" style="width: 85%;"></div></div>
        </div>
        <div class="skill-container">
            <span>IoT Development</span>
            <div class="skill-container">
            <div class="bar"><div class="fill" style="width: 90%;"></div></div>
        </div>
    </section>

    <section class="card">
        <h2>Contact</h2>
        <p>📧 fawazaga@gmail.com</p>
    </section>

    <script>
        // Trigger progress bar animation
        window.onload = () => document.querySelectorAll('.fill').forEach(el => el.style.width = el.style.width);
    </script>
</body>
</html>
